<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Threat Level Midnight</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<div class="game-wrapper">
    <canvas id="gameCanvas" width="320" height="320"></canvas>
    
    <div id="dialogue-box" class="hidden">
        <p id="dialogue-text"></p>
        <p class="blink-arrow">▼ Tap to continue</p>
    </div>

    <div class="d-pad">
        <button id="btn-up" class="d-btn">▲</button>
        <div class="d-row">
            <button id="btn-left" class="d-btn">◀</button>
            <button id="btn-right" class="d-btn">▶</button>
        </div>
        <button id="btn-down" class="d-btn">▼</button>
    </div>
</div>

<script src="app.js?v=2"></script>
</body>
</html>
